services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: certcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/certcp
    volumes:
      - ./certs:/certs:ro   # Mount CA cert + key + server TLS cert
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - app
    ports:
      - "443:443"    # Control API + UI (no mTLS)
      - "8443:8443"  # Agent API (mTLS enforced)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro

volumes:
  pg_data:
