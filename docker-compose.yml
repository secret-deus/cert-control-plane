services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: certcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: cert-control-plane-app:latest
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/certcp
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'
    volumes:
      - ./server/app:/app/app:ro
      - ./server/alembic:/app/alembic:ro
      - ./server/alembic.ini:/app/alembic.ini:ro
      - ./server/frontend/dist:/app/frontend/dist:ro
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    ports:
      - "8080:8000"    # Control API
      - "8081:8001"    # Agent API

volumes:
  pg_data:
