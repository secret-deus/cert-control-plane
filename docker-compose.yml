services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: certcp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: "0.50"

  app:
    image: cert-control-plane-app:latest
    restart: unless-stopped
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/certcp
      CORS_ORIGINS: ${CORS_ORIGINS:-[]}
      DEV_MODE: "false"
    command: ["sh", "-c", "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8080:8000"    # Dashboard + Control API + Agent API
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3)\nPY"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    mem_limit: 768m
    cpus: "1.00"

volumes:
  pg_data:
