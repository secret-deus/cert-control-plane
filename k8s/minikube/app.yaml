apiVersion: v1
kind: Service
metadata:
  name: cert-control-plane
  labels:
    app.kubernetes.io/name: cert-control-plane
    app.kubernetes.io/part-of: cert-control-plane
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
  selector:
    app.kubernetes.io/name: cert-control-plane
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-control-plane
  labels:
    app.kubernetes.io/name: cert-control-plane
    app.kubernetes.io/part-of: cert-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-control-plane
        app.kubernetes.io/part-of: cert-control-plane
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until pg_isready -h cert-control-plane-db -U postgres -d certcp; do
                echo "waiting for postgres"
                sleep 2
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cert-control-plane-secrets
                  key: POSTGRES_PASSWORD
      containers:
        - name: app
          image: cert-control-plane-app:minikube
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: cert-control-plane-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cert-control-plane-secrets
                  key: POSTGRES_PASSWORD
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cert-control-plane-secrets
                  key: ADMIN_API_KEY
            - name: CA_KEY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: cert-control-plane-secrets
                  key: CA_KEY_ENCRYPTION_KEY
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@cert-control-plane-db:5432/certcp
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
