apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cert-control-plane-db-data
  labels:
    app.kubernetes.io/name: cert-control-plane-db
    app.kubernetes.io/part-of: cert-control-plane
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cert-control-plane-db
  labels:
    app.kubernetes.io/name: cert-control-plane-db
    app.kubernetes.io/part-of: cert-control-plane
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
  selector:
    app.kubernetes.io/name: cert-control-plane-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-control-plane-db
  labels:
    app.kubernetes.io/name: cert-control-plane-db
    app.kubernetes.io/part-of: cert-control-plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cert-control-plane-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cert-control-plane-db
        app.kubernetes.io/part-of: cert-control-plane
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: certcp
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cert-control-plane-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - certcp
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - certcp
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
              subPath: data
      volumes:
        - name: pg-data
          persistentVolumeClaim:
            claimName: cert-control-plane-db-data
