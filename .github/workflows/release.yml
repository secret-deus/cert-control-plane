name: Release Agents

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  GO_VERSION: "1.22"

jobs:
  build-rust-agent:
    name: Build Rust Agent
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: cert-agent-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: cert-agent-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: cert-agent-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: cert-agent-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: ${{ matrix.target }}

      - name: Build
        run: |
          cd agent-rust
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd agent-rust
          mkdir -p dist
          if [ -f target/${{ matrix.target }}/release/cert-agent ]; then
            cp target/${{ matrix.target }}/release/cert-agent dist/${{ matrix.artifact_name }}
          else
            cp target/release/cert-agent dist/${{ matrix.artifact_name }}
          fi
          chmod +x dist/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: agent-rust/dist/${{ matrix.artifact_name }}

  build-go-agent:
    name: Build Go Agent
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: cert-agent-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: cert-agent-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact_name: cert-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: cert-agent-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd agent-go
          go build -ldflags="-s -w" -o dist/${{ matrix.artifact_name }} ./cmd/cert-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.artifact_name }}
          path: agent-go/dist/${{ matrix.artifact_name }}

  upload-release-assets:
    name: Upload Release Assets
    needs: [build-rust-agent, build-go-agent]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release-draft:
    name: Create Release Draft
    needs: [build-rust-agent, build-go-agent]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release Draft
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          name: Agent Binaries ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
          body: |
            # Agent Binaries

            This release contains pre-built agent binaries for multiple platforms.

            ## Rust Agent
            - `cert-agent-linux-amd64`: Linux x86_64
            - `cert-agent-linux-arm64`: Linux ARM64
            - `cert-agent-darwin-amd64`: macOS x86_64 (Intel)
            - `cert-agent-darwin-arm64`: macOS ARM64 (Apple Silicon)

            ## Go Agent
            - `go-cert-agent-linux-amd64`: Linux x86_64
            - `go-cert-agent-linux-arm64`: Linux ARM64
            - `go-cert-agent-darwin-amd64`: macOS x86_64 (Intel)
            - `go-cert-agent-darwin-arm64`: macOS ARM64 (Apple Silicon)

            ## Installation

            ```bash
            # Download the binary for your platform
            chmod +x cert-agent-*
            sudo mv cert-agent-* /usr/local/bin/cert-agent
            ```

            See [agent-rust/README.md](agent-rust/README.md) for detailed usage instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
