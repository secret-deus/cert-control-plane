name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      ADMIN_API_KEY: "test-ci-api-key-not-real"
      CA_KEY_ENCRYPTION_KEY: "dGVzdC1jaS1rZXktbm90LXJlYWwtMzItYnl0ZXMhIQ=="
      CA_CERT_PATH: "./certs/ca.crt"
      CA_KEY_PATH: "./certs/ca.key"
      STRICT_CA_STARTUP: "false"
      SECRET_KEY: "ci-secret-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install aiosqlite ruff
      - name: Lint
        run: ruff check app/ agent/ tests/ --select E,F,W,B,S --ignore E501,S101
      - name: Test
        run: pytest tests/ -v --tb=short

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
