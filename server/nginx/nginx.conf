# cert-control-plane nginx configuration
# HTTP mode for internal testing / reverse proxy setup
# Port 8000 → Next.js Frontend (primary) + Control API (/api/*)
# Port 8001 → Agent API (isolated)
#
# For production HTTPS, place this behind a reverse proxy (nginx/HAProxy/LB)
# that handles TLS termination.

events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------------------------------
    # Upstream: FastAPI application
    # -----------------------------------------------------------------------
    upstream control_api {
        server app:8000;
        keepalive 32;
    }

    upstream agent_api {
        server app:8001;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # Port 8001 – AGENT API (HTTP)
    # -----------------------------------------------------------------------
    server {
        listen 8001;
        server_name _;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Client-CN     "";
        proxy_set_header X-Client-Serial "";
        proxy_set_header X-Client-Verified "";
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # All agent endpoints route only through the agent port
        location /api/agent/ {
            proxy_pass http://agent_api;
        }

        # All other paths → 404 on agent port
        location / {
            return 404;
        }
    }

    # -----------------------------------------------------------------------
    # Port 8000 – CONTROL API + NEXT.JS FRONTEND (HTTP)
    # -----------------------------------------------------------------------
    server {
        listen 8000;
        server_name _;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Strip identity headers to prevent forgery from the control port
        proxy_set_header X-Client-CN     "";
        proxy_set_header X-Client-Serial "";
        proxy_set_header X-Client-Verified "";
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Agent API is blocked on the control port
        location /api/agent/ {
            return 403 "Agent API is only accessible via the agent port (8001)";
        }

        # Control API → FastAPI
        location /api/ {
            proxy_pass http://control_api;
        }

        # Next.js static assets
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_cache_valid 200 60d;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # All other requests → Next.js frontend
        location / {
            proxy_pass http://frontend;
        }
    }
}
