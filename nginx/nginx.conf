# cert-control-plane nginx configuration
# Port 8443 → Agent API (mTLS required)
# Port 443  → Control API + UI (TLS only, admin API key in header)

events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------------------------------
    # Upstream: FastAPI application
    # -----------------------------------------------------------------------
    upstream app {
        server app:8000;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # Port 8443 – AGENT API (mTLS enforced)
    # nginx verifies client certificate against the CA; injects CN header.
    # -----------------------------------------------------------------------
    server {
        listen 8443 ssl;
        server_name _;

        # Server TLS
        ssl_certificate     /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # mTLS: optional – /register works without client cert (bootstrap),
        # all other agent endpoints require a verified client cert.
        ssl_client_certificate /certs/ca.crt;
        ssl_verify_client      optional;
        ssl_verify_depth       2;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Bootstrap registration – no client cert needed
        location = /api/agent/register {
            # Clear CN header so backend knows this is unauthenticated
            proxy_set_header X-Client-CN    "";
            proxy_set_header X-Client-Verified $ssl_client_verify;
            proxy_pass http://app;
        }

        # All other agent endpoints – require verified client cert
        location /api/agent/ {
            if ($ssl_client_verify != SUCCESS) {
                return 403 "Valid client certificate required";
            }
            proxy_set_header X-Client-CN       $ssl_client_s_dn_cn;
            proxy_set_header X-Client-Verified $ssl_client_verify;
            proxy_pass http://app;
        }

        # All other paths → 404 on agent port
        location / {
            return 404;
        }
    }

    # -----------------------------------------------------------------------
    # Port 443 – CONTROL API + UI (TLS only; admin API key in X-Admin-API-Key)
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        # Server TLS
        ssl_certificate     /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Strip X-Client-CN to prevent forgery from the control port
        proxy_set_header X-Client-CN     "";
        proxy_set_header X-Client-Verified "";
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Block any attempt to reach the agent-only bundle endpoint from the control port.
        # Agents MUST connect on port 8443 (mTLS). This prevents UI/admin from
        # impersonating an agent to download private keys.
        location /api/agent/bundle {
            return 403 "Bundle endpoint is only accessible via the mTLS port (8443)";
        }

        # Agent API registration is also blocked on port 443
        location /api/agent/ {
            return 403 "Agent API is only accessible via the mTLS port (8443)";
        }

        # Control API + Swagger docs + UI
        location / {
            proxy_pass http://app;
        }
    }

    # -----------------------------------------------------------------------
    # Redirect HTTP → HTTPS
    # -----------------------------------------------------------------------
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
