# cert-control-plane nginx configuration
# Port 8443 → Agent API (TLS + token auth in backend)
# Port 443  → Control API + UI (TLS only, admin API key in header)

events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------------------------------
    # Upstream: FastAPI application
    # -----------------------------------------------------------------------
    upstream app {
        server app:8000;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # Shared TLS session cache and security headers
    # -----------------------------------------------------------------------
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # -----------------------------------------------------------------------
    # Port 8443 – AGENT API
    # Dedicated TLS entry for agent traffic; backend performs token auth.
    # -----------------------------------------------------------------------
    server {
        listen 8443 ssl;
        server_name _;

        # Server TLS
        ssl_certificate     /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Client-CN     "";
        proxy_set_header X-Client-Serial "";
        proxy_set_header X-Client-Verified "";
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # All agent endpoints route only through the agent port
        location /api/agent/ {
            proxy_pass http://app;
        }

        # All other paths → 404 on agent port
        location / {
            return 404;
        }
    }

    # -----------------------------------------------------------------------
    # Port 443 – CONTROL API + UI (TLS only; admin API key in X-Admin-API-Key)
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name _;

        # Server TLS
        ssl_certificate     /certs/server.crt;
        ssl_certificate_key /certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Strip identity headers to prevent forgery from the control port
        proxy_set_header X-Client-CN     "";
        proxy_set_header X-Client-Serial "";
        proxy_set_header X-Client-Verified "";
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Agent API is blocked on the control port
        location /api/agent/ {
            return 403 "Agent API is only accessible via the agent port (8443)";
        }

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Control API + Swagger docs + UI
        location / {
            proxy_pass http://app;
        }
    }

    # -----------------------------------------------------------------------
    # Redirect HTTP → HTTPS
    # -----------------------------------------------------------------------
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }
}
